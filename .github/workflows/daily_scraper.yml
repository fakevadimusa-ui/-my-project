name: Daily Zillow Lead Scraper

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Write service account key
        env:
          KEY_JSON: ${{ secrets.ZILLOW_BOT_KEY }}
        run: printf '%s' "$KEY_JSON" > scripts/zillow-bot-key.json

      - name: Run Zillow scraper
        run: python scripts/zillow_scraper.py

      - name: Commit updated leads.json
        run: |
          git config user.name "zillow-bot"
          git config user.email "zillow-bot@kbros.auto"
          git add public/leads.json || true
          git diff --staged --quiet || git commit -m "auto: daily lead update $(date +'%Y-%m-%d')"
          git push || true
