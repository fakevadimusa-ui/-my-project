name: Daily Zillow Lead Scraper

on:
  schedule:
    # 7:00 AM CST every day (CST = UTC-6, so 13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:
    # Also lets you click "Run workflow" manually from GitHub any time

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Write service account key
        # Paste your zillow-bot-key.json content into GitHub → Settings → Secrets → ZILLOW_BOT_KEY
        run: echo '${{ secrets.ZILLOW_BOT_KEY }}' > scripts/zillow-bot-key.json

      - name: Run Zillow scraper
        run: python scripts/zillow_scraper.py

      - name: Commit any updated leads.json
        run: |
          git config user.name "zillow-bot"
          git config user.email "zillow-bot@kbros.auto"
          git add public/leads.json || true
          git diff --staged --quiet || git commit -m "auto: daily lead update $(date +'%Y-%m-%d')"
          git push || true
